---
layout: default
site_type: bank
base_path: /aifirst-bank
---

<section class="bg-gray-100 flex items-center justify-center py-10 md:py-16">
    <div class="w-full max-w-md bg-white rounded-lg shadow-xl p-8 md:p-10">
        <div class="text-center">
            <h2 class="mt-6 text-3xl font-extrabold text-gray-900">Log in to Online Banking</h2>
            <p class="mt-2 text-sm text-gray-600">Access your secure online banking portal.</p>
        </div>
        <form id="login-form" class="mt-8 space-y-6" action="#" method="POST">
            <div>
                <label for="login-name" class="block text-sm font-medium text-gray-700">Name</label>
                <div class="mt-1">
                    <input id="login-name" name="login-name" type="text" autocomplete="username" required
                        class="block w-full px-4 py-3 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                        placeholder="Enter your Name">
                </div>
            </div>
            <div class="relative">
                <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                <div class="mt-1">
                    <input id="password" name="password" type="password" autocomplete="current-password" required
                        class="block w-full px-4 py-3 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                        placeholder="Enter your Password" readonly>
                </div>
            </div>
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                    <label for="remember-me" class="ml-2 block text-sm text-gray-900">Remember me</label>
                </div>
                <div class="text-sm">
                    <a href="#" class="font-medium text-blue-600 hover:text-blue-500">Forgot your password?</a>
                </div>
            </div>
            <div>
                <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition duration-300">Log in</button>
            </div>
        </form>
        <div class="mt-6 text-center text-sm text-gray-500">
            Don't have online access?
            <a href="/aifirst-bank/open-account.html" class="font-medium text-blue-600 hover:text-blue-500">Sign up now.</a>
        </div>
    </div>
</section>

<script>
document.addEventListener('DOMContentLoaded', function () {
    var storedUsername = localStorage.getItem('username');
    if (storedUsername) {
        window.location.href = '/aifirst-bank/olb/dashboard.html';
        return;
    }
});
document.getElementById("login-name").addEventListener("blur", function(e) { document.getElementById("password").value = "glia123!!"; });
document.getElementById('login-form').addEventListener('submit', function (e) {
    e.preventDefault();
    var loginName = document.getElementById('login-name').value;
    var password = document.getElementById('password').value;
    if (!loginName || !password) { alert('Please enter both Name and Password.'); return; }
    if (loginName.length > 1 && password === 'glia123!!') {
        localStorage.setItem('loggingStatus', 'true');
        localStorage.setItem('username', loginName);
        localStorage.setItem('sessionExpiration', Date.now() + (60 * 60 * 1000));
        window.location.href = '/aifirst-bank/olb/dashboard.html';
    } else {
        alert('Invalid Name ID or Password. Please try again.');
    }
});
</script>
