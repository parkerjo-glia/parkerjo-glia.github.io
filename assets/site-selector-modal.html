<div class="modal fade" id="siteSelectorModal" tabindex="-1" role="dialog" aria-labelledby="siteSelectorModalLabel"
    aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="siteSelectorModalLabel">Settings</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="settingsForm">
                    <div id="siteSelectionFields">
                        <div class="form-group mb-3">
                            <label for="siteSelectorDDL" class="form-label">Select Demo Site</label>
                            <select class="form-control" id="siteSelectorDDL"></select>
                        </div>
                        <div class="form-group">
                            <label for="siteIdTXT" class="form-label">Or enter a site id</label>
                            <input type="text" class="form-control" id="siteIdTXT" placeholder="Type here">
                            <span class="error-message" id="siteid-error" style="color: red; font-size: 0.8em; display: none;"></span>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" id="saveSettings">Save changes</button>
            </div>
        </div>
    </div>
</div>
